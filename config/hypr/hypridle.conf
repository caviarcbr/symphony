general {
    lock_cmd = $HOME/.local/bin/lock-screen                                   # lock screen and 1password
    before_sleep_cmd = loginctl lock-session               # lock before suspend.
    after_sleep_cmd = hyprctl dispatch "hl.dsp.dpms({action = 'on'})"             # to avoid having to press a key twice to turn on the display.
    inhibit_sleep = 3                                      # wait until screen is locked
}

listener {
    timeout = 150                                                                          # 2.5min
    on-timeout = pidof -x screensaver || nohup setsid $HOME/.local/bin/screensaver-launch  # start screensaver if not already running
}

listener {
    timeout = 300                                                                        # 5min
    on-timeout = loginctl lock-session                                                    # lock screen when timeout has passed
}
